name: Publish SDK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      - name: Validate standalone package
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          for (const section of ['dependencies', 'optionalDependencies']) {
            for (const dep of Object.keys(pkg[section] || {})) {
              if (dep.startsWith('@allstak/')) {
                throw new Error(`${section} contains internal AllStak runtime dependency: ${dep}`);
              }
            }
          }
          const lock = fs.existsSync('package-lock.json') ? fs.readFileSync('package-lock.json', 'utf8') : '';
          if (/(file:|link:|workspace:)/.test(lock)) {
            throw new Error('package-lock.json contains local, link, or workspace dependency references');
          }
          NODE

      - name: Pack and inspect
        run: |
          mkdir -p pack
          npm pack --json --pack-destination pack > pack/pack.json
          TARBALL="$(node -e "const p=require('./pack/pack.json'); console.log('pack/'+p[0].filename)")"
          tar -tf "$TARBALL" | tee pack/contents.txt
          if grep -E '(^|/)(\.env|\.env\..*|\.npmrc|id_rsa|.*\.pem|.*\.key|.*\.crt)$' pack/contents.txt; then
            echo "Package tarball contains a forbidden secret-like file" >&2
            exit 1
          fi
          echo "$TARBALL" > pack/tarball-path.txt

      - name: Clean install and import smoke
        run: |
          TARBALL="$(cat pack/tarball-path.txt)"
          TMP="$(mktemp -d)"
          cp "$TARBALL" "$TMP/package.tgz"
          cd "$TMP"
          npm init -y >/dev/null
          npm install --ignore-scripts ./package.tgz typescript >/dev/null
          node -e "const sdk=require('@allstak/otel'); if (!sdk.AllStakOtelExporter) throw new Error('missing CJS export')"
          node --input-type=module -e "const sdk=await import('@allstak/otel'); if (!sdk.AllStakOtelExporter) throw new Error('missing ESM export')"
          printf "import { AllStakOtelExporter } from '@allstak/otel';\\nvoid AllStakOtelExporter;\\n" > smoke.ts
          npx tsc --noEmit --module NodeNext --moduleResolution NodeNext --target ES2022 smoke.ts

      - uses: actions/upload-artifact@v4
        with:
          name: package-inspection
          path: pack/

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TARBALL="$(cat pack/tarball-path.txt)"
          npm publish "$TARBALL" --tag beta --access public
